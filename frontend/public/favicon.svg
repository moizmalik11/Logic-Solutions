<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background with slight rounding -->
  <rect width="32" height="32" rx="6" fill="#0D0D0F"/>
  <!-- Outer L-bracket: top-left corner mark -->
  <path d="M6 6 L6 15 M6 6 L15 6" stroke="#B57540" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Inner code bracket / circuit path -->
  <path d="M10 11 L10 22 L21 22" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <!-- Accent dot at corner junction -->
  <circle cx="10" cy="22" r="1.5" fill="#B57540"/>
  <!-- Bottom-right corner bracket (mirrored) -->
  <path d="M26 26 L26 18 M26 26 L18 26" stroke="#B57540" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
